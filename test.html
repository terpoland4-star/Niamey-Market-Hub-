<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
</head>
<body>
    <h1>Test fichiers JS</h1>
    <div id="result"></div>

    <script src="js/shop-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/shop-loader.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        var html = '';
        
        if (typeof SHOP_CONFIG !== 'undefined') {
            html += '<p style="color:green;">✅ shop-config.js - ' + SHOP_CONFIG.name + '</p>';
        } else {
            html += '<p style="color:red;">❌ shop-config.js</p>';
        }
        
        if (typeof formatPrice !== 'undefined') {
            html += '<p style="color:green;">✅ utils.js</p>';
        } else {
            html += '<p style="color:red;">❌ utils.js</p>';
        }
        
        if (typeof I18n !== 'undefined') {
            html += '<p style="color:green;">✅ i18n.js</p>';
        } else {
            html += '<p style="color:red;">❌ i18n.js</p>';
        }
        
        if (typeof Theme !== 'undefined') {
            html += '<p style="color:green;">✅ theme.js</p>';
        } else {
            html += '<p style="color:red;">❌ theme.js</p>';
        }
        
        if (typeof Cart !== 'undefined') {
            html += '<p style="color:green;">✅ cart.js</p>';
        } else {
            html += '<p style="color:red;">❌ cart.js</p>';
        }
        
        if (typeof loadShopConfig !== 'undefined') {
            html += '<p style="color:green;">✅ shop-loader.js</p>';
        } else {
            html += '<p style="color:red;">❌ shop-loader.js</p>';
        }
        
        if (typeof UI !== 'undefined') {
            html += '<p style="color:green;">✅ ui.js</p>';
        } else {
            html += '<p style="color:red;">❌ ui.js</p>';
        }
        
        document.getElementById('result').innerHTML = html;
    </script>
</body>
</html>
