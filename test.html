<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Config</title>
</head>
<body>
    <h1>Test SHOP_CONFIG</h1>
    <div id="result"></div>

    <script src="js/shop-config.js"></script>
    <script>
        var html = '';
        if (typeof SHOP_CONFIG !== 'undefined') {
            html += '<p>✅ SHOP_CONFIG défini</p>';
            html += '<p>Nom : ' + (SHOP_CONFIG.name || 'NON') + '</p>';
            html += '<p>Produits : ' + (SHOP_CONFIG.products ? SHOP_CONFIG.products.length : 0) + '</p>';
        } else {
            html += '<p>❌ SHOP_CONFIG non défini</p>';
        }
        document.getElementById('result').innerHTML = html;
    </script>
</body>
</html>
