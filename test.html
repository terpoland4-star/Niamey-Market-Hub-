<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Config</title>
</head>
<body>
    <h1>Test config.js</h1>
    <div id="result">Chargement...</div>

    <script src="js/config.js"></script>
    <script>
        try {
            if (typeof CONFIG !== 'undefined' && CONFIG.shopName) {
                document.getElementById('result').innerHTML = 
                    '<p style="color:green;">✅ config.js OK - ' + CONFIG.shopName + ' - ' + CONFIG.products.length + ' produits</p>';
            } else {
                document.getElementById('result').innerHTML = 
                    '<p style="color:red;">❌ CONFIG non trouvé</p>';
            }
        } catch(e) {
            document.getElementById('result').innerHTML = 
                '<p style="color:red;">❌ Erreur: ' + e.message + '</p>';
        }
    </script>
</body>
</html>
