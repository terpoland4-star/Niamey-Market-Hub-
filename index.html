<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#E05206">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="description" content="Niamey Market Hub – Plateforme de boutiques en ligne">
    <meta property="og:title" content="Niamey Market Hub">
    <meta property="og:description" content="Votre marketplace multi-boutiques">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" sizes="96x96" href="https://placehold.co/96x96/E05206/white?text=NMH">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
    <title>Niamey Market Hub</title>
    <style>
        /* Styles additionnels pour les pages login/register/dashboard */
        .page { padding: 20px; max-width: 600px; margin: 0 auto; }
        .page h2 { margin-bottom: 20px; }
        .page form { display: flex; flex-direction: column; gap: 12px; }
        .page input, .page select { padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); }
        .page button { margin-top: 8px; }
        .my-products { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
        .my-product-item { display: flex; align-items: center; gap: 12px; background: var(--surface); padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
        .my-product-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .my-product-item .info { flex: 1; }
        .my-product-item .actions { display: flex; gap: 6px; }
        .btn-danger { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <noscript>
        <div style="padding:40px;text-align:center;background:#fff3cd;color:#856404;">
            <h2>⚠️ JavaScript requis</h2>
            <p>Cette application nécessite JavaScript.</p>
        </div>
    </noscript>

    <div class="banner"><div class="banner-text">🚧 Site en construction 🚧</div></div>

    <header class="toolbar">
        <select id="lang-selector" class="toolbar-select">
            <option value="fr">🇫🇷 FR</option>
            <option value="en">🇬🇧 EN</option>
        </select>
        <nav style="display:flex; gap:10px; margin-left:auto;">
            <a href="#home" class="toolbar-btn">Accueil</a>
            <a href="#login" class="toolbar-btn" id="login-link">Connexion</a>
            <a href="#register" class="toolbar-btn" id="register-link">Inscription</a>
            <a href="#dashboard" class="toolbar-btn" id="dashboard-link" style="display:none;">Dashboard</a>
            <a href="#orders" class="toolbar-btn" id="orders-link" style="display:none;">Commandes</a>
        </nav>
        <div style="display:flex;gap:6px;">
            <button id="theme-btn" class="toolbar-btn"><i class="fas fa-moon"></i></button>
            <button id="contrast-btn" class="toolbar-btn"><i class="fas fa-adjust"></i></button>
            <button id="font-minus" class="toolbar-btn">A-</button>
            <button id="font-plus" class="toolbar-btn">A+</button>
            <button id="cart-btn" class="toolbar-btn">
                <i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span>
            </button>
        </div>
    </header>

    <main id="app"><div class="loading">Chargement...</div></main>
    <footer id="footer"></footer>

    <div class="whatsapp-float">
        <a href="#" target="_blank" rel="noopener" class="whatsapp-btn" id="whatsapp-link">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>

    <!-- Debug panel -->
    <div id="debug-panel" style="position:fixed; bottom:0; left:0; right:0; background:#1a1a2e; color:#0f0; padding:8px; font-size:11px; z-index:99999; max-height:150px; overflow:auto; font-family:monospace; display:none;"></div>
    <script>
        (function() {
            var debugEl = document.getElementById('debug-panel');
            function debug(msg, type) {
                type = type || 'log';
                var color = type === 'error' ? '#f44' : type === 'warn' ? '#fa0' : '#0f0';
                var time = new Date().toLocaleTimeString();
                debugEl.innerHTML += '<div style="color:' + color + '">[' + time + '] ' + msg + '</div>';
                debugEl.style.display = 'block';
            }
            window.debug = debug;
            window.onerror = function(msg, url, line) {
                debug('JS ERROR: ' + msg + ' (ligne ' + line + ')', 'error');
                return false;
            };
            window.addEventListener('unhandledrejection', function(e) {
                debug('PROMISE REJECTED: ' + (e.reason && e.reason.message ? e.reason.message : e.reason), 'error');
            });
            setTimeout(function() {
                var app = document.getElementById('app');
                if (app && app.innerHTML.indexOf('Chargement') > -1) {
                    debug('WARN: Loader toujours affiché après 4 secondes', 'warn');
                }
            }, 4000);
            debug('Debug panel ready');
        })();
    </script>

    <!-- Scripts – Ordre critique -->
    <script src="js/utils.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/shop-config.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/storage.js"></script>   <!-- Nouveau : base locale -->
    <script src="js/router.js"></script>   <!-- Nouveau : routeur SPA -->
    <script src="js/pages.js"></script>    <!-- Nouveau : vues -->
    <script src="js/app.js"></script>      <!-- Modifié : lance le routeur -->

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function(){});
        }
    </script>
</body>
</html>
